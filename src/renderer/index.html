<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="widget">
    <div class="header">
      <h2>今日计划</h2>
      <button id="settingsBtn" title="设置">⚙</button>
    </div>

    <div class="input-row">
      <input id="taskInput" placeholder="添加一条计划..." />
      <button id="addBtn">+</button>
    </div>
    <div class="input-row">
      <input id="taskTime" type="time" title="提醒时间（可不填）" />
      <select id="taskRepeat" title="重复">
        <option value="none">不重复</option>
        <option value="daily">每天</option>
        <option value="weekly">每周</option>
      </select>
    </div>

    <div id="settingsPanel" class="settings-panel hidden">
      <label>每日汇总提醒 <input id="summaryTime" type="time" /></label>
      <label>透明度 <input id="opacity" type="range" min="0.3" max="1" step="0.05" /></label>
      <label>主题色 <input id="accent" type="color" /></label>
    </div>

    <ul id="taskList"></ul>
  </div>

  <!-- 顺序很重要：先数据层，再提醒层，最后界面层 -->
  <script src="store.js"></script>
  <script src="reminders.js"></script>
  <script src="app.js"></script>
</body>
</html>
