<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <!-- Top bar: three columns (left: back / center: title + date / right: window buttons) -->
    <header class="topbar">
      <div class="left">
        <button id="backBtn" class="icon-btn back hidden" title="Back">←</button>
      </div>
      <div class="center">
        <h1 id="pageTitle">Today</h1>
        <div id="headerDate" class="subtitle"></div>
      </div>
      <div class="win-controls">
        <button id="minBtn" class="icon-btn" title="Minimize">—</button>
        <button id="closeBtn" class="icon-btn" title="Close">✕</button>
      </div>
    </header>

    <!-- Content: five pages, only one visible at a time -->
    <main class="content">
      <!-- Today -->
      <section id="view-today" class="view active">
        <ul id="todayList" class="task-list"></ul>
        <p id="todayEmpty" class="empty" data-i18n="today_empty">No tasks today. Tap ＋ to add one.</p>
      </section>

      <!-- Add / Edit task -->
      <section id="view-add" class="view">
        <form id="addForm" class="form">
          <label><span data-i18n="f_name">Task name</span>
            <input id="f-name" data-i18n-ph="ph_name" placeholder="e.g. Memorize 10 English words" required /></label>
          <label><span data-i18n="f_date">Date</span> <input id="f-date" type="date" /></label>
          <div class="row2">
            <label><span data-i18n="f_start">Start time</span> <input id="f-start" type="time" /></label>
            <label><span data-i18n="f_end">End time</span> <input id="f-end" type="time" /></label>
          </div>
          <label><span data-i18n="f_repeat">Repeat</span>
            <select id="f-repeat">
              <option value="none" data-i18n="repeat_none">No repeat</option>
              <option value="daily" data-i18n="repeat_daily">Daily</option>
              <option value="weekly" data-i18n="repeat_weekly">Weekly</option>
            </select>
          </label>
          <label class="switch-row"><span data-i18n="f_checkin">Check-in tracking</span>
            <input id="f-checkin" type="checkbox" class="switch" /></label>
          <div id="checkinInfo" class="checkin-info hidden"></div>
          <label><span data-i18n="f_notes">Notes</span>
            <textarea id="f-notes" rows="3" data-i18n-ph="ph_notes" placeholder="Optional"></textarea></label>
          <button type="submit" class="primary" data-i18n="save_task">Save Task</button>
        </form>
      </section>

      <!-- Manage -->
      <section id="view-manage" class="view">
        <ul id="manageList" class="task-list"></ul>
        <p id="manageEmpty" class="empty" data-i18n="manage_empty">No tasks yet</p>
      </section>

      <!-- Activity log -->
      <section id="view-log" class="view">
        <ul id="logList" class="log-list"></ul>
        <p id="logEmpty" class="empty" data-i18n="log_empty">No activity yet</p>
      </section>

      <!-- Settings -->
      <section id="view-settings" class="view">
        <div class="settings">
          <label class="setting-row">
            <span data-i18n="set_notify">Task notifications</span>
            <input id="s-notify" type="checkbox" class="switch" />
          </label>
          <div class="setting-row">
            <span data-i18n="set_reminderlead">Remind before</span>
            <select id="s-lead">
              <option value="0" data-i18n="lead_0">On time</option>
              <option value="5" data-i18n="lead_5">5 min before</option>
              <option value="10" data-i18n="lead_10">10 min before</option>
              <option value="30" data-i18n="lead_30">30 min before</option>
            </select>
          </div>
          <label class="setting-row">
            <span data-i18n="set_defaultcheckin">Check-in on by default</span>
            <input id="s-defcheckin" type="checkbox" class="switch" />
          </label>
          <label class="setting-row">
            <span data-i18n="set_opacity">Window opacity</span>
            <input id="s-opacity" type="range" min="0.3" max="1" step="0.05" />
          </label>
          <div class="setting-row">
            <span data-i18n="set_bg">Background</span>
            <div class="bg-presets">
              <button class="bg-preset" data-bg="#1e1e28" style="background:#1e1e28" title="Dark"></button>
              <button class="bg-preset" data-bg="#f2f3f7" style="background:#f2f3f7" title="Light"></button>
              <button class="bg-preset" data-bg="#13233a" style="background:#13233a" title="Navy"></button>
              <input id="s-bg" type="color" title="Custom color" />
            </div>
          </div>
          <div class="setting-row">
            <span data-i18n="set_lang">Language</span>
            <select id="s-lang">
              <option value="en">English</option>
              <option value="zh">中文</option>
              <option value="fr">Français</option>
            </select>
          </div>
          <div class="setting-row test-row">
            <button id="testNotifyBtn" class="secondary" data-i18n="test_notify">Test notification</button>
            <button id="testTaskBtn" class="secondary" data-i18n="test_task">Create 1-min test task</button>
          </div>
        </div>
      </section>
    </main>

    <!-- Floating add button (only shown on the Today page) -->
    <button id="fab" class="fab" title="Add task">＋</button>

    <!-- Bottom navigation -->
    <nav class="bottomnav">
      <button class="nav-item active" data-view="today"><span class="ico">🗓</span><span data-i18n="nav_today">Today</span></button>
      <button class="nav-item" data-view="manage"><span class="ico">📋</span><span data-i18n="nav_manage">Manage</span></button>
      <button class="nav-item" data-view="log"><span class="ico">🕘</span><span data-i18n="nav_log">Log</span></button>
      <button class="nav-item" data-view="settings"><span class="ico">⚙️</span><span data-i18n="nav_settings">Settings</span></button>
    </nav>
  </div>

  <!-- Load order matters: data -> i18n -> reminders -> UI -->
  <script src="store.js"></script>
  <script src="i18n.js"></script>
  <script src="reminders.js"></script>
  <script src="app.js"></script>
</body>
</html>
